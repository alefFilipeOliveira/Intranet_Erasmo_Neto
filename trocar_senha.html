
{% extends "base.html" %}{% block title %}Trocar senha{% endblock %}
{% block content %}
<section class="login-card">
<h1>Troca obrigatória de senha</h1><p class="muted">Por segurança, defina uma nova senha antes de continuar.</p>
<form method="post" class="stack-form"><label>Nova senha<input name="senha" type="password" required></label><label>Confirmar senha<input name="confirmar" type="password" required></label><button class="btn primary">Salvar senha</button></form>
</section>
{% endblock %}
